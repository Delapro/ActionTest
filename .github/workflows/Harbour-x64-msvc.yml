# Achtung es gibt bitbucket-Abhängigkeiten! https://bitbucket.org/lorenzodla...
name: Harbour for Windows 64 using MSVC

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      run_smoke_tests:
        description: "Compile and run tests/hello.prg"
        required: false
        default: true
        type: boolean
      run_regression_tests:
        description: "Build and run utils/hbtest regression suite"
        required: false
        default: false
        type: boolean
            
jobs:
  build:
    runs-on: windows-2025-vs2026  # früher: windows-latest, windows-2022 geht
    
    if: github.actor == github.event.repository.owner.login
    
    steps:
    - name: Checkout harbour/core repo
      uses: actions/checkout@v6   # bezieht sich auf https://github.com/actions/checkout/releases/tag/v6
      with:
       repository: harbour/core
       path: harbour

#    - name: Install dependencies
#      run: |
#         (new-object System.Net.WebClient).DownloadFile('https://bitbucket.org/lorenzodla/mod_harbour_actions_resources/downloads/OpenSSL-Win32.zip', 'C:\temp\OpenSSL-Win32.zip')
#         Expand-Archive -LiteralPath C:\temp\OpenSSL-Win32.zip -DestinationPath C:\OpenSSL -Force
#         (new-object System.Net.WebClient).DownloadFile('https://bitbucket.org/lorenzodla/mod_harbour_actions_resources/downloads/curl-7.54.0-win32-mingw.zip', 'C:\temp\curl-7.54.0-win32-mingw.zip')
#         Expand-Archive -LiteralPath C:\temp\curl-7.54.0-win32-mingw.zip -DestinationPath C:\curl -Force

    - name: Preflight MSVC
      shell: cmd
      run: |
        for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find VC\Auxiliary\Build\vcvars64.bat`) do set "VCVARS64=%%i"
    
        echo VCVARS64=%VCVARS64%
    
        if not exist "%VCVARS64%" (
          echo vcvars64.bat not found
          exit /b 1
        )
    
        set "VSINSTALLDIR="
        set "VCINSTALLDIR="
        set "VCToolsInstallDir="
    
        call "%VCVARS64%" || exit /b 1
    
        echo VSINSTALLDIR=%VSINSTALLDIR%
        echo VCINSTALLDIR=%VCINSTALLDIR%
        echo VCToolsInstallDir=%VCToolsInstallDir%
    
        where cl.exe || exit /b 1
        REM cl.exe /Bv || exit /b 1
        
    - name: Installing dependencies
      shell: cmd 
      run: |
        vcpkg.exe install curl --triplet x64-windows-static
        vcpkg.exe install openssl --triplet x64-windows-static
        vcpkg integrate install

    - name: Compile Harbour
      shell: cmd
      run: |
        cd harbour

        for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find VC\Auxiliary\Build\vcvars64.bat`) do set "VCVARS64=%%i"
        call "%VCVARS64%" || exit /b 1
        where cl.exe || exit /b 1
    
        REM cl /Bv || exit /b 1

        set HB_BUILD_MODE=c
        set HB_USER_PRGFLAGS=-l-
        set HB_BUILD_CONTRIBS=
        REM set HB_WITH_OPENSSL=C:\OpenSSL\include
        set HB_WITH_OPENSSL=C:\vcpkg\packages\openssl-windows_x64-windows-static\include
        REM set HB_WITH_OPENSSL=C:\vcpkg\packages\openssl-windows_x64-windows\include
        REM set HB_WITH_CURL=C:\curl\include
        set HB_WITH_CURL=C:\vcpkg\packages\curl_x64-windows-static\include
        REM set HB_WITH_CURL=C:\vcpkg\packages\curl_x64-windows\include
        set HB_STATIC_OPENSSL=yes
        set HB_STATIC_CURL=yes
        set HB_COMPILER=msvc64

        win-make.exe

    - name: Smoke test Harbour hello.prg
      if: ${{ inputs.run_smoke_tests }}
      shell: cmd
      run: |
        cd harbour
    
        for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find VC\Auxiliary\Build\vcvars64.bat`) do set "VCVARS64=%%i"
    
        call "%VCVARS64%" || exit /b 1
    
        where cl.exe || exit /b 1
        where link.exe || exit /b 1
        where lib.exe || exit /b 1
        where mt.exe || exit /b 1
    
        set HB_COMPILER=msvc64
        set HB_PLATFORM=win
    
        set HB_USER_PRGFLAGS=
        set HB_USER_CFLAGS=
        set HB_USER_LDFLAGS=
        set HB_USER_LIBS=
        set HBMK_OPTIONS=
    
        cd tests
    
        ..\bin\win\msvc64\hbmk2.exe -info -trace -width=0 -static hello.prg
        set HBMK_RC=%ERRORLEVEL%
    
        if exist hello.exe (
          echo hello.exe was created despite hbmk2 rc=%HBMK_RC%
          hello.exe > hello.out || exit /b 1
          type hello.out
          findstr /C:"Hello, world!" hello.out || exit /b 1
          exit /b 0
        )
    
        echo hbmk2 failed with rc=%HBMK_RC%
        dir
        exit /b %HBMK_RC%
    
    - name: Harbour regression test hbtest
      if: ${{ inputs.run_regression_tests }}
      shell: cmd
      run: |
        cd harbour
    
        for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find VC\Auxiliary\Build\vcvars64.bat`) do set "VCVARS64=%%i"
    
        call "%VCVARS64%" || exit /b 1
        where cl.exe || exit /b 1
    
        set HB_COMPILER=msvc64
    
        cd utils\hbtest
    
        ..\..\bin\win\msvc64\hbmk2.exe hbtest.hbp -o"%TEMP%\hbtest" || exit /b 1
    
        "%TEMP%\hbtest.exe" > "%TEMP%\hbtest.out" 2>&1
        set HBTEST_RC=%ERRORLEVEL%
    
        type "%TEMP%\hbtest.out"
    
        exit /b %HBTEST_RC%
    
    - name: Create output folders
      shell: cmd
      run: |
        mkdir output
        mkdir output\bin
        copy harbour\bin\win\msvc64\*.exe output\bin
        mkdir output\lib
        copy harbour\lib\win\msvc64\*.lib output\lib
        mkdir output\include 
        copy harbour\include output\include

    - name: Set Date Variable
      id: current-date
      shell: pwsh
      # Hinweis zum Durchreichen von Variablen: https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#example-setting-a-value
      run: |
        # früher: "::set-output name=DATE::$(get-date -Format 'yyyy_MM_dd')"
        # jetzt: echo "{name}={value}" >> $GITHUB_OUTPUT
        # siehe: https://github.blog/changelog/2022-10-11-github-actions-deprecating-save-state-and-set-output-commands/
        # alles nicht so einfach, siehe: https://stackoverflow.com/a/74444094
        # daraus resultiert:
        echo "DATE=$(get-date -Format 'yyyy_MM_dd')" >> $env:GITHUB_OUTPUT
      
    - name: Upload Harbour to artifact
      uses: actions/upload-artifact@v6
      with:
       name: harbour_win64_msvc_${{ steps.current-date.outputs.DATE }}
       path: output
